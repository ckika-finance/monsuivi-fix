<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Chiika Finance">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#1AAF7A">
  <link rel="apple-touch-icon" href="icon.svg">
  <link rel="manifest" href="manifest.json">
  <title>Chiika Finance</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
  <!-- Tabler Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
      <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="app" id="app" style="display:none">

  <!-- Sidebar desktop -->
  <div class="sidebar" id="sidebar">
    <div class="sidebar-logo">Chiika <span>Finance</span></div>

    <!-- Nav principale -->
    <div class="nav-item active" data-page="dashboard">
      <i class="ti ti-layout-dashboard nav-icon"></i> Vue d'ensemble
    </div>
    <div class="nav-item" data-page="analyse">
      <i class="ti ti-chart-bar nav-icon"></i> Détails financiers
    </div>
    <div class="nav-item" data-page="transactions">
      <i class="ti ti-arrows-exchange nav-icon"></i> Transactions
    </div>
    <div class="nav-item" data-page="budget">
      <i class="ti ti-wallet nav-icon"></i> Budget
    </div>
    <div class="nav-item" data-page="abonnements">
      <i class="ti ti-repeat nav-icon"></i> Abonnements
    </div>
    <div class="nav-item" data-page="prets">
      <i class="ti ti-building-bank nav-icon"></i> Prêts
    </div>

    <!-- Section personnes — injectée dynamiquement -->
    <div class="nav-section-label" id="persons-nav-label" style="display:none">Personnes</div>
    <!-- Les nav-items personnes sont injectés par refreshSidebarNames() -->

    <!-- Bottom -->
    <div class="nav-bottom">
      <div class="nav-item" data-page="parametres">
        <i class="ti ti-settings nav-icon"></i> Paramètres
      </div>
      <div class="nav-item" onclick="authLogout()" style="color:var(--text3)">
        <i class="ti ti-logout nav-icon"></i> Déconnexion
      </div>
    </div>
  </div>

  <!-- Main -->
  <div class="main">
    <div class="topbar">
      <div class="topbar-line1">
        <span class="topbar-title" id="page-title">Vue d'ensemble</span>
        <span class="readonly-badge" id="readonly-badge" style="display:none">🔒 Lecture seule</span>
      </div>
      <div class="topbar-right">
        <!-- Sélecteur Année avec label -->
        <div class="period-selector-wrap">
          <span class="period-label">Année</span>
          <select class="year-select" id="year-select"><option value="2025">2025</option></select>
        </div>
        <!-- Sélecteur Mois avec label -->
        <div class="period-selector-wrap">
          <span class="period-label">Mois</span>
          <select class="month-select" id="month-select">
            <option value="0">Tous</option>
            <option value="1">Janvier</option><option value="2">Février</option>
            <option value="3">Mars</option><option value="4">Avril</option>
            <option value="5">Mai</option><option value="6">Juin</option>
            <option value="7">Juillet</option><option value="8">Août</option>
            <option value="9">Septembre</option><option value="10">Octobre</option>
            <option value="11">Novembre</option><option value="12">Décembre</option>
          </select>
        </div>
        <!-- Sync status discret -->
        <div class="sync-badge" id="sync-badge" title="Statut synchronisation">
          <span class="sync-dot"></span>
        </div>
        <button class="logout-btn" onclick="authLogout()" title="Déconnexion">
          <i class="ti ti-logout"></i>
        </button>
      </div>
    </div>

    <div class="content" id="content">
      <div class="empty-state">Chargement…</div>
    </div>
  </div>

  <!-- Navigation mobile basse -->
  <nav class="mobile-nav" id="mobile-nav">
    <button class="mobile-nav-item active" data-page="dashboard">
      <i class="ti ti-layout-dashboard nav-icon-mob"></i><span>Vue</span>
    </button>
    <button class="mobile-nav-item" data-page="analyse">
      <i class="ti ti-chart-bar nav-icon-mob"></i><span>Détails</span>
    </button>
    <button class="mobile-nav-item" data-page="transactions">
      <i class="ti ti-arrows-exchange nav-icon-mob"></i><span>Opérations</span>
    </button>
    <button class="mobile-nav-item" data-page="budget">
      <i class="ti ti-wallet nav-icon-mob"></i><span>Budget</span>
    </button>
    <button class="mobile-nav-item" data-page="abonnements">
      <i class="ti ti-repeat nav-icon-mob"></i><span>Abonnements</span>
    </button>
    <button class="mobile-nav-item" data-page="prets">
      <i class="ti ti-building-bank nav-icon-mob"></i><span>Prêts</span>
    </button>
    <button class="mobile-nav-item" data-page="person1" id="mob-p1" style="display:none">
      <i class="ti ti-user nav-icon-mob"></i><span id="mob-p1-label">P1</span>
    </button>
    <button class="mobile-nav-item" data-page="person2" id="mob-p2" style="display:none">
      <i class="ti ti-user nav-icon-mob"></i><span id="mob-p2-label">P2</span>
    </button>
    <button class="mobile-nav-item" data-page="person3" id="mob-p3" style="display:none">
      <i class="ti ti-user nav-icon-mob"></i><span id="mob-p3-label">P3</span>
    </button>
    <button class="mobile-nav-item" data-page="person4" id="mob-p4" style="display:none">
      <i class="ti ti-user nav-icon-mob"></i><span id="mob-p4-label">P4</span>
    </button>
    <button class="mobile-nav-item" data-page="parametres">
      <i class="ti ti-settings nav-icon-mob"></i><span>Réglages</span>
    </button>
  </nav>

</div><!-- /app -->

<!-- Scripts -->
<script src="js/01-data_v42166.js"></script>
<script src="js/00-auth_v42166.js"></script>
<script src="js/02-database_v42166.js"></script>
<script src="js/03-utils_v42166.js"></script>
<script src="js/11-permissions_v42166.js"></script>
<script src="js/04-app_v42166.js"></script>
<script src="js/05-page-dashboard_v42166.js"></script>
<script src="js/06-pages-tx-budget-abo_v42166.js"></script>
<script src="js/07-pages-perso-parametres_v42166.js"></script>
<script src="js/08-modals_v42166.js"></script>
<script src="js/09-page-prets_v42166.js"></script>
<script src="js/10-onboarding_v42166.js"></script>
<script>
  initAuth().then(isLoggedIn => {
    if (isLoggedIn) {
      document.getElementById('app').style.display = 'flex';
      loadDB();
    }
  });
</script>
</body>
</html>
